spring:
  application:
    name: bifriends-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/bifriends
    username: bifriends
    password: bifriends
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
